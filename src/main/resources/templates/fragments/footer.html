<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<footer th:fragment="footer" id="dcim-footer" style="width:100%; background:transparent; margin-top:auto; border-top:1px solid rgba(11,60,117,0.1);">
  <style>
    #dcim-footer .footer-inner {
      width: 100%;
      padding: 0 24px;
      box-sizing: border-box;
    }
    #dcim-footer .footer-main {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 28px 0 20px;
    }
    #dcim-footer .footer-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    #dcim-footer .footer-nav a {
      color: #003DA5;
      font-size: 0.875rem;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
    }
    #dcim-footer .footer-nav a:hover { text-decoration: underline; }
    #dcim-footer .footer-bottom {
      border-top: 1px solid rgba(107,114,128,0.2);
      padding: 14px 0 20px;
      text-align: center;
    }
    /* ─── 4K ─── */
    @media (min-width: 3840px) {
      #dcim-footer .footer-inner { padding: 0 100px; }
      #dcim-footer .footer-main  { padding: 64px 0 48px; gap: 60px; }
      #dcim-footer .footer-logo-icon { width: 100px !important; height: 100px !important; }
      #dcim-footer .footer-logo-icon svg { width: 60px !important; height: 60px !important; }
      #dcim-footer .footer-logo-name { font-size: 2rem !important; }
      #dcim-footer .footer-logo-sub  { font-size: 1.4rem !important; }
      #dcim-footer .footer-nav a     { font-size: 1.5rem !important; padding: 12px 20px !important; }
      #dcim-footer .footer-nav span  { font-size: 1.4rem !important; }
      #dcim-footer .footer-copy      { font-size: 1.4rem !important; }
      #dcim-footer .footer-bottom    { padding: 28px 0 44px; }
      #dcim-footer .footer-credit    { font-size: 1.2rem !important; }
    }
    /* ─── 2K ─── */
    @media (min-width: 2560px) and (max-width: 3839px) {
      #dcim-footer .footer-inner { padding: 0 72px; }
      #dcim-footer .footer-main  { padding: 36px 0 28px; }
      #dcim-footer .footer-logo-icon { width: 60px !important; height: 60px !important; }
      #dcim-footer .footer-logo-name { font-size: 2.15rem !important; }
      #dcim-footer .footer-nav a     { font-size: 3rem !important; }
      #dcim-footer .footer-copy      { font-size: 3.9rem !important; }
    }
    /* ─── 1400px+ ─── */
    @media (min-width: 1400px) and (max-width: 2559px) {
      #dcim-footer .footer-inner { padding: 0 48px; }
    }
    /* ─── Móvil ─── */
    @media (max-width: 640px) {
      #dcim-footer .footer-main  { flex-direction: column; align-items: flex-start; padding: 20px 0 14px; }
      #dcim-footer .footer-right { text-align: left !important; }
      #dcim-footer .footer-inner { padding: 0 16px; }
    }
  </style>

  <div class="footer-inner">
    <div class="footer-main">

      <!-- Logo -->
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="footer-logo-icon" style="width:48px; height:48px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#e6f7ff,#f0fbff); border:1px solid rgba(0,61,165,0.08); box-shadow:0 8px 24px rgba(0,61,165,0.06); flex-shrink:0;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="5" fill="#003DA5" />
            <text x="12" y="16" text-anchor="middle" font-family="Barlow, Arial" font-size="10" fill="#ffffff" font-weight="700">DC</text>
          </svg>
        </div>
        <div style="line-height:1.3;">
          <div class="footer-logo-name" style="font-weight:700; color:#003DA5; font-size:0.95rem;">DATA CENTER COMMODITIES</div>
          <div class="footer-logo-sub" style="font-size:0.8rem; color:#004a99;">Sistema de Gestión Técnica</div>
        </div>
      </div>

      <!-- Nav links -->
      <div class="footer-nav">
        <a th:href="@{/}">Inicio</a>
        <span style="color:#d1d5db;">|</span>
        <a th:href="@{/user/list}" th:if="${#authentication?.name}">Usuarios</a>
        <a th:href="@{/login}" th:unless="${#authentication?.name}">Acceder</a>
        <span style="color:#d1d5db;" th:if="${#authentication?.name}">|</span>
        <span style="color:#004a99; font-size:0.8rem;" th:if="${#authentication?.name}">
          Conectado como: <strong th:text="${#authentication.name}"></strong>
        </span>
      </div>

      <!-- Copyright -->
      <div class="footer-right" style="text-align:right;">
        <div class="footer-copy" style="color:#004a99; font-size:0.8rem;">
          © <span th:text="${#dates.year(#dates.createNow())}">2025</span> INELCOM
        </div>
        <div style="color:#6b7280; font-size:0.75rem; margin-top:2px;">DATA CENTER COMMODITIES</div>
      </div>
    </div>

    <!-- Bottom line -->
    <div class="footer-bottom">
      <div class="footer-credit" style="color:#6b7280; font-size:0.7rem;">
        Desarrollado por Arturo Chacón
      </div>
    </div>
  </div>
</footer>

</html>

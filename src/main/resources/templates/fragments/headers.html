<head th:fragment="headers">  
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>Sistema Data Center - IPSS</title>
        
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        
        <!-- Tailwind CSS CDN -->
        <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
        
        <!-- Tailwind CSS Configuration -->
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    extend: {
                        colors: {
                            'tf-blue': '#003DA5',
                            'tf-cyan': '#00A1E6', 
                            'tf-dark': '#002B5C',
                            'tf-light': '#f0f8ff',
                            'accent': '#003DA5',
                            'primary': '#003DA5',
                            'secondary': '#00A1E6',
                            'success': '#10b981',
                            'danger': '#ef4444',
                            'warning': '#f59e0b',
                            'info': '#3b82f6'
                        },
                        fontFamily: {
                            'sans': ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'Noto Sans', 'sans-serif'],
                            'display': ['Inter', 'ui-sans-serif', 'system-ui']
                        },
                        spacing: {
                            '18': '4.5rem',
                            '88': '22rem'
                        },
                        borderRadius: {
                            'xl': '1rem',
                            '2xl': '1.5rem',
                            '3xl': '2rem'
                        },
                        boxShadow: {
                            'soft': '0 2px 15px -3px rgba(0, 0, 0, 0.07), 0 10px 20px -2px rgba(0, 0, 0, 0.04)',
                            'medium': '0 4px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                            'hard': '0 10px 40px -10px rgba(0, 0, 0, 0.1), 0 2px 10px -2px rgba(0, 0, 0, 0.04)',
                            '3d': '0 20px 40px -10px rgba(0, 29, 77, 0.15), 0 10px 25px -5px rgba(0, 61, 165, 0.1)'
                        },
                        animation: {
                            'fadeIn': 'fadeIn 0.5s ease-in-out',
                            'slideUp': 'slideUp 0.6s ease-out',
                            'slideDown': 'slideDown 0.4s ease-out',
                            'slideLeft': 'slideLeft 0.5s ease-out',
                            'slideRight': 'slideRight 0.5s ease-out',
                            'scaleIn': 'scaleIn 0.3s ease-out',
                            'bounce-light': 'bounce-light 1s infinite',
                            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                        },
                        keyframes: {
                            fadeIn: {
                                '0%': { opacity: '0' },
                                '100%': { opacity: '1' }
                            },
                            slideUp: {
                                '0%': { opacity: '0', transform: 'translateY(30px)' },
                                '100%': { opacity: '1', transform: 'translateY(0)' }
                            },
                            slideDown: {
                                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                                '100%': { opacity: '1', transform: 'translateY(0)' }
                            },
                            slideLeft: {
                                '0%': { opacity: '0', transform: 'translateX(30px)' },
                                '100%': { opacity: '1', transform: 'translateX(0)' }
                            },
                            slideRight: {
                                '0%': { opacity: '0', transform: 'translateX(-30px)' },
                                '100%': { opacity: '1', transform: 'translateX(0)' }
                            },
                            scaleIn: {
                                '0%': { opacity: '0', transform: 'scale(0.95)' },
                                '100%': { opacity: '1', transform: 'scale(1)' }
                            },
                            'bounce-light': {
                                '0%, 100%': { transform: 'translateY(-5%)' },
                                '50%': { transform: 'translateY(0)' }
                            }
                        }
                    }
                },
                plugins: []
            }
        </script>
        
        <!-- Estilos CSS Optimizados -->
        <style>
            /* Variables CSS principales */
            :root {
                --tf-blue: #003DA5;
                --tf-cyan: #00A1E6;
                --tf-dark: #002B5C;
                --tf-light: #f0f8ff;
                --shadow-light: rgba(0, 29, 77, 0.08);
                --shadow-medium: rgba(0, 29, 77, 0.15);
                --glass-bg: rgba(255, 255, 255, 0.9);
                --glass-border: rgba(255, 255, 255, 0.3);
            }

            /* Reset y estilos base */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                line-height: 1.6;
                color: #1f2937;
                background: linear-gradient(135deg, #f0f8ff 0%, #e6f3ff 100%);
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
            }

            /* Efectos glassmorphism simplificados */
            .glass-card {
                background: var(--glass-bg);
                backdrop-filter: blur(10px);
                border: 1px solid var(--glass-border);
                border-radius: 16px;
                box-shadow: 0 8px 32px var(--shadow-light);
                transition: all 0.3s ease;
            }

            .glass-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 40px var(--shadow-medium);
            }

            /* Botones modernos */
            .btn-modern {
                background: linear-gradient(45deg, var(--tf-blue), var(--tf-cyan));
                color: white;
                border: none;
                border-radius: 8px;
                padding: 10px 20px;
                font-weight: 600;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                transition: all 0.3s ease;
                cursor: pointer;
            }

            .btn-modern:hover {
                transform: translateY(-1px);
                box-shadow: 0 8px 25px rgba(0, 61, 165, 0.3);
                color: white;
                text-decoration: none;
            }

            .btn-secondary {
                background: linear-gradient(45deg, #6b7280, #9ca3af);
            }

            .btn-success {
                background: linear-gradient(45deg, #10b981, #059669);
            }

            .btn-danger {
                background: linear-gradient(45deg, #ef4444, #dc2626);
            }

            /* Formularios */
            .form-modern input,
            .form-modern select,
            .form-modern textarea {
                background: rgba(255, 255, 255, 0.95);
                border: 1px solid rgba(0, 61, 165, 0.2);
                border-radius: 8px;
                padding: 12px 16px;
                font-size: 16px;
                width: 100%;
                transition: all 0.3s ease;
            }

            .form-modern input:focus,
            .form-modern select:focus,
            .form-modern textarea:focus {
                outline: none;
                border-color: var(--tf-blue);
                box-shadow: 0 0 0 3px rgba(0, 61, 165, 0.1);
                background: rgba(255, 255, 255, 1);
            }

            /* Navegación */
            .nav-modern {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid rgba(0, 61, 165, 0.1);
                box-shadow: 0 2px 20px var(--shadow-light);
            }

            /* Tablas */
            .table-modern {
                background: var(--glass-bg);
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 20px var(--shadow-light);
            }

            .table-modern th {
                background: linear-gradient(45deg, var(--tf-blue), var(--tf-cyan));
                color: white;
                font-weight: 600;
                padding: 16px;
                text-align: left;
            }

            .table-modern td {
                padding: 12px 16px;
                border-bottom: 1px solid rgba(0, 61, 165, 0.1);
            }

            .table-modern tr:hover td {
                background: rgba(0, 61, 165, 0.05);
            }

            /* Alertas */
            .alert-modern {
                border-radius: 8px;
                padding: 16px;
                margin-bottom: 16px;
                display: flex;
                align-items: center;
                font-weight: 500;
            }

            .alert-success {
                background: rgba(16, 185, 129, 0.1);
                color: #065f46;
                border-left: 4px solid #10b981;
            }

            .alert-danger {
                background: rgba(239, 68, 68, 0.1);
                color: #991b1b;
                border-left: 4px solid #ef4444;
            }

            .alert-info {
                background: rgba(59, 130, 246, 0.1);
                color: #1e40af;
                border-left: 4px solid #3b82f6;
            }

            /* Dashboard */
            .dashboard-card {
                background: var(--glass-bg);
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 4px 20px var(--shadow-light);
                transition: all 0.3s ease;
                border: 1px solid var(--glass-border);
            }

            .dashboard-card:hover {
                transform: translateY(-3px);
                box-shadow: 0 8px 30px var(--shadow-medium);
            }

            /* Responsive */
            @media (max-width: 768px) {
                .btn-modern {
                    width: 100%;
                    margin-bottom: 8px;
                }
                
                .table-modern th,
                .table-modern td {
                    padding: 8px 12px;
                    font-size: 14px;
                }
            }

            /* Scrollbar personalizada */
            ::-webkit-scrollbar {
                width: 6px;
            }

            ::-webkit-scrollbar-track {
                background: rgba(240, 248, 255, 0.3);
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(0, 61, 165, 0.3);
                border-radius: 3px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(0, 61, 165, 0.5);
            }

            /* Animaciones simples */
            .animate-fadeIn {
                animation: fadeIn 0.5s ease-in;
            }

            .animate-slideUp {
                animation: slideUp 0.6s ease-out;
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            @keyframes slideUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* Utilidades */
            .text-gradient {
                background: linear-gradient(45deg, var(--tf-blue), var(--tf-cyan));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
        </style>
    </head>

<nav th:fragment="nav" id="dcim-nav" style="
  background: linear-gradient(135deg, #0b3c75 0%, #1e3a5f 60%, #00a4c8 100%);
  box-shadow: 0 2px 20px rgba(0,0,0,0.28);
  width: 100%;
  border-bottom: 2px solid rgba(0,164,200,0.55);
  position: relative; z-index: 100;
">
  <style>
    #dcim-nav * { box-sizing: border-box; }

    /* ── Estructura ─────────────────────────────────────── */
    #dcim-nav .nav-inner { width: 100%; padding: 0 32px; }
    #dcim-nav .nav-row {
      display: flex; align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    /* ── Logo ───────────────────────────────────────────── */
    #dcim-nav .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; flex-shrink: 0;
      padding-right: 28px;
      border-right: 1px solid rgba(255,255,255,0.14);
    }
    #dcim-nav .nav-logo-badge {
      width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
      background: rgba(0,164,200,0.22);
      border: 1px solid rgba(0,164,200,0.45);
      display: flex; align-items: center; justify-content: center;
    }
    #dcim-nav .nav-logo-name {
      font-family: 'Barlow', system-ui, sans-serif;
      font-weight: 800; color: #fff;
      font-size: 0.92rem; letter-spacing: 0.07em; text-transform: uppercase;
    }
    #dcim-nav .nav-logo-sub {
      font-family: 'Barlow', system-ui, sans-serif;
      font-size: 0.6rem; color: rgba(255,255,255,0.5);
      letter-spacing: 0.14em; text-transform: uppercase; margin-top: 2px;
    }

    /* ── Links escritorio ───────────────────────────────── */
    #dcim-nav .nav-links {
      display: flex; align-items: center; gap: 2px;
      flex: 1; padding: 0 20px;
    }
    #dcim-nav .nav-links a {
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.68);
      font-size: 12.5px; font-weight: 600;
      padding: 8px 13px; border-radius: 6px;
      text-decoration: none; white-space: nowrap;
      letter-spacing: 0.025em;
      transition: color 0.15s;
      position: relative;
    }
    #dcim-nav .nav-links a svg { opacity: 0.6; transition: opacity 0.15s; flex-shrink: 0; }
    #dcim-nav .nav-links a::after {
      content: ''; position: absolute;
      bottom: 0; left: 13px; right: 13px;
      height: 2px; background: #00c9f0; border-radius: 2px;
      transform: scaleX(0); transform-origin: center;
      transition: transform 0.18s ease;
    }
    #dcim-nav .nav-links a:hover { color: #fff; }
    #dcim-nav .nav-links a:hover svg { opacity: 1; }
    #dcim-nav .nav-links a:hover::after { transform: scaleX(1); }

    /* ── Auth ───────────────────────────────────────────── */
    #dcim-nav .nav-auth {
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
      padding-left: 28px;
      border-left: 1px solid rgba(255,255,255,0.14);
    }
    #dcim-nav .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: rgba(0,164,200,0.3);
      border: 1.5px solid rgba(0,164,200,0.6);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; color: #fff;
      text-transform: uppercase;
    }
    #dcim-nav .nav-user-name {
      font-size: 12.5px; font-weight: 700; color: rgba(255,255,255,0.92);
      max-width: 130px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; line-height: 1;
    }
    #dcim-nav .nav-user-role {
      font-size: 10px; font-weight: 700; color: #00c9f0;
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px;
    }
    #dcim-nav .nav-logout {
      display: flex; align-items: center; gap: 5px;
      color: rgba(255,255,255,0.68);
      font-size: 12px; font-weight: 600; letter-spacing: 0.03em;
      padding: 6px 13px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    #dcim-nav .nav-logout:hover { color: #fff; border-color: rgba(255,255,255,0.42); background: rgba(255,255,255,0.07); }
    #dcim-nav .nav-login {
      display: flex; align-items: center; gap: 6px;
      background: #00a4c8; color: #fff;
      font-size: 12.5px; font-weight: 700; letter-spacing: 0.03em;
      padding: 7px 16px; border-radius: 6px;
      text-decoration: none; transition: background 0.15s; white-space: nowrap;
    }
    #dcim-nav .nav-login:hover { background: #0095b8; }

    /* ── Burger ─────────────────────────────────────────── */
    #dcim-nav .burger-btn {
      display: none;
      align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 7px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff; cursor: pointer; flex-shrink: 0; margin-left: 8px;
    }
    #dcim-nav .burger-btn:hover { background: rgba(255,255,255,0.17); }

    /* ── Mobile menu ────────────────────────────────────── */
    #dcim-nav .mobile-menu {
      display: none; flex-direction: column;
      background: rgba(8,35,72,0.97);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(0,164,200,0.25);
      padding: 8px 16px 14px;
    }
    #dcim-nav .mobile-menu.open { display: flex; }
    #dcim-nav .mobile-menu a {
      display: flex; align-items: center; gap: 11px;
      color: rgba(255,255,255,0.78);
      font-size: 13.5px; font-weight: 600;
      padding: 11px 14px; border-radius: 7px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    #dcim-nav .mobile-menu a svg { opacity: 0.65; }
    #dcim-nav .mobile-menu a:hover { background: rgba(255,255,255,0.09); color: #fff; }
    #dcim-nav .mobile-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }

    /* ── Responsive: 4K ─────────────────────────────────── */
    @media (min-width: 3840px) {
      #dcim-nav .nav-inner { padding: 0 100px; }
      #dcim-nav .nav-row { height: 120px; }
      #dcim-nav .nav-links a { font-size: 1.6rem !important; padding: 14px 28px !important; gap: 12px; }
      #dcim-nav .nav-links a svg { width: 28px !important; height: 28px !important; }
      #dcim-nav .nav-links a::after { left: 28px; right: 28px; height: 3px; }
      #dcim-nav .nav-logo-badge { width: 80px !important; height: 80px !important; border-radius: 16px !important; }
      #dcim-nav .nav-logo-badge svg { width: 54px !important; height: 54px !important; }
      #dcim-nav .nav-logo-name { font-size: 2rem !important; }
      #dcim-nav .nav-logo-sub { font-size: 1.15rem !important; }
      #dcim-nav .nav-avatar { width: 60px !important; height: 60px !important; font-size: 26px !important; }
      #dcim-nav .nav-user-name { font-size: 1.3rem !important; max-width: 260px !important; }
      #dcim-nav .nav-user-role { font-size: 1rem !important; }
      #dcim-nav .nav-logout { font-size: 1.3rem !important; padding: 12px 28px !important; }
      #dcim-nav .nav-logout svg { width: 22px !important; height: 22px !important; }
    }
    @media (min-width: 2560px) and (max-width: 3839px) {
      #dcim-nav .nav-inner { padding: 0 64px; }
      #dcim-nav .nav-row { height: 80px; }
      #dcim-nav .nav-links a { font-size: 1.05rem !important; padding: 10px 18px !important; }
      #dcim-nav .nav-logo-name { font-size: 1.25rem !important; }
      #dcim-nav .nav-logo-sub { font-size: 0.78rem !important; }
      #dcim-nav .nav-logo-badge { width: 52px !important; height: 52px !important; }
    }
    @media (min-width: 1400px) and (max-width: 2559px) {
      #dcim-nav .nav-inner { padding: 0 44px; }
    }

    /* ── Responsive: mobile ─────────────────────────────── */
    @media (max-width: 900px) {
      #dcim-nav .nav-links { display: none; }
      #dcim-nav .nav-logo { border-right: none; }
      #dcim-nav .nav-auth { border-left: none; padding-left: 0; }
      #dcim-nav .burger-btn { display: flex; }
    }
    @media (max-width: 600px) {
      #dcim-nav .nav-inner { padding: 0 14px; }
      #dcim-nav .nav-user-name, #dcim-nav .nav-user-role { display: none; }
    }
  </style>

  <div class="nav-inner">
    <div class="nav-row">

      <!-- ── Logo ── -->
      <a th:href="@{/}" class="nav-logo">
        <div class="nav-logo-badge">
          <!-- Icono servidor / rack de datos -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="5" rx="1"/>
            <rect x="2" y="10" width="20" height="5" rx="1"/>
            <rect x="2" y="17" width="20" height="4" rx="1"/>
            <circle cx="19" cy="5.5" r="1" fill="#00c9f0" stroke="none"/>
            <circle cx="19" cy="12.5" r="1" fill="#00c9f0" stroke="none"/>
            <circle cx="19" cy="19" r="1" fill="rgba(255,255,255,0.4)" stroke="none"/>
          </svg>
        </div>
        <div>
          <div class="nav-logo-name">Telefónica</div>
          <div class="nav-logo-sub">Data Center Commodities</div>
        </div>
      </a>

      <!-- ── Links escritorio ── -->
      <div class="nav-links">
        <a th:href="@{/dashboard}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
        <a th:href="@{/inventario}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
          Inventario
        </a>
        <a th:href="@{/ingresoap}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Ingresos
        </a>
        <a th:href="@{/gestion/list}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          Gestión
        </a>
        <a th:href="@{/temperaturas}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
          </svg>
          Temperatura
        </a>
        <a th:href="@{/plano-sala}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
          Planos
        </a>
        <a th:href="@{/salas}" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Salas
        </a>
      </div>

      <!-- ── Auth + burger ── -->
      <div class="nav-auth">
        <div th:if="${#authentication?.name}" style="display:flex; align-items:center; gap:10px;">
          <!-- Avatar con inicial -->
          <div class="nav-avatar" th:text="${#strings.substring(#authentication.name, 0, 1)}">U</div>
          <!-- Nombre + rol -->
          <div>
            <div class="nav-user-name" th:text="${#authentication.name}">usuario</div>
            <div class="nav-user-role"
                 th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">USER</div>
          </div>
          <!-- Salir -->
          <a th:href="@{/logout}" class="nav-logout">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Salir
          </a>
        </div>
        <a th:href="@{/login}" th:unless="${#authentication?.name}" class="nav-login">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Iniciar sesión
        </a>
        <!-- Burger -->
        <button class="burger-btn" type="button" id="dcim-burger">
          <svg id="burger-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- ── Menú mobile ── -->
  <div class="mobile-menu" id="dcim-mobile-menu">
    <a th:href="@{/dashboard}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>Dashboard
    </a>
    <a th:href="@{/inventario}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>Inventario
    </a>
    <a th:href="@{/ingresoap}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>Ingresos
    </a>
    <a th:href="@{/gestion/list}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>Gestión
    </a>
    <a th:href="@{/temperaturas}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
      </svg>Temperatura
    </a>
    <a th:href="@{/plano-sala}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
      </svg>Planos
    </a>
    <a th:href="@{/salas}" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>Salas
    </a>
    <hr class="mobile-divider"/>
    <div th:if="${#authentication?.name}" style="display:flex; align-items:center; gap:10px; padding: 4px 14px 2px;">
      <div style="width:34px; height:34px; border-radius:50%; background:rgba(0,164,200,0.3); border:1.5px solid rgba(0,164,200,0.55); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; color:#fff; text-transform:uppercase; flex-shrink:0;"
           th:text="${#strings.substring(#authentication.name, 0, 1)}">U</div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:13px; font-weight:700; color:rgba(255,255,255,0.92); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"
             th:text="${#authentication.name}">usuario</div>
        <div style="font-size:10px; font-weight:700; color:#00c9f0; letter-spacing:0.1em; text-transform:uppercase; margin-top:2px;"
             th:text="${#strings.replace(#authentication.authorities.iterator().next().authority, 'ROLE_', '')}">USER</div>
      </div>
      <a th:href="@{/logout}" style="display:flex; align-items:center; gap:5px; color:rgba(255,255,255,0.7); font-size:13px; font-weight:600; padding:7px 13px; border-radius:6px; border:1px solid rgba(255,255,255,0.2); text-decoration:none; flex-shrink:0;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>Salir
      </a>
    </div>
    <a th:href="@{/login}" th:unless="${#authentication?.name}"
       style="display:flex; align-items:center; gap:7px; background:#00a4c8; color:#fff; font-size:13.5px; font-weight:700; padding:11px 14px; border-radius:8px; text-decoration:none; margin-top:4px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>Iniciar sesión
    </a>
  </div>

  <script>
    (function(){
      var btn  = document.getElementById('dcim-burger');
      var menu = document.getElementById('dcim-mobile-menu');
      var icon = document.getElementById('burger-icon');
      if (!btn || !menu) return;
      btn.addEventListener('click', function(){
        menu.classList.toggle('open');
        if (icon) {
          icon.innerHTML = menu.classList.contains('open')
            ? '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'
            : '<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>';
        }
      });
    })();
  </script>
</nav>

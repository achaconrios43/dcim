<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/headers :: headers}"></head>
<body class="min-h-screen flex flex-col" style="
  font-family:'Barlow',sans-serif;
  background:
    radial-gradient(circle at 10% 15%, rgba(11,60,117,0.18), transparent 35%),
    radial-gradient(circle at 90% 5%,  rgba(0,164,200,0.22), transparent 30%),
    linear-gradient(160deg, #1a1a2e 0%, #0b3c75 45%, #1e3a5f 80%, #0f4c75 100%);
  min-height:100vh;
">

<nav th:replace="~{fragments/navdar :: nav}"></nav>

<main class="flex-1 flex items-center justify-center py-12 px-4">
  <div style="
    background: rgba(255,255,255,0.97);
    border-radius: 18px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.28);
    border: 1px solid rgba(255,255,255,0.5);
    width: 100%; max-width: 420px;
    padding: 40px 36px;
    animation: revealUp 0.4s ease both;
  ">
    <!-- Header card -->
    <div class="flex items-center gap-3 mb-6">
      <div style="width:46px; height:46px; border-radius:10px; background:linear-gradient(135deg,#0b3c75,#00a4c8); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="26" height="26" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C9.24 2 7 4.24 7 7s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM12 14c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z" fill="#fff"/>
        </svg>
      </div>
      <div>
        <div style="font-weight:800; font-size:1.15rem; color:#0b3c75; font-family:Barlow,sans-serif;">Acceso DCIM</div>
        <div style="font-size:0.8rem; color:#5b667a;">Introduce tus credenciales para continuar</div>
      </div>
    </div>

    <!-- Error Spring Security -->
    <div th:if="${param.error != null}"
         style="background:#fef2f2; border:1px solid #fca5a5; border-radius:8px; padding:10px 14px; color:#b91c1c; font-size:13px; font-weight:600; margin-bottom:16px;">
      ⚠ Credenciales incorrectas. Intenta nuevamente.
    </div>
    <div th:if="${param.expired != null}"
         style="background:#fffbeb; border:1px solid #fcd34d; border-radius:8px; padding:10px 14px; color:#92400e; font-size:13px; font-weight:600; margin-bottom:16px;">
      ⏱ Tu sesión expiró por inactividad (3 minutos). Vuelve a iniciar sesión.
    </div>

    <form id="loginForm" th:action="@{/login}" method="post" class="space-y-4">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <!-- Email -->
      <div>
        <label for="email" style="font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:5px;">Usuario o correo</label>
        <input type="text" id="email" name="email" required autocomplete="username"
               placeholder="usuario@empresa.cl"
               style="width:100%; padding:10px 14px; border:1.5px solid rgba(11,60,117,0.18); border-radius:8px; font-size:14px; font-family:Barlow,sans-serif; outline:none; transition:border-color 0.2s; box-sizing:border-box;"
               onfocus="this.style.borderColor='#00a4c8'" onblur="this.style.borderColor='rgba(11,60,117,0.18)'"/>
        <p id="userCheck" style="display:none; color:#dc2626; font-size:12px; margin-top:4px;">Usuario no encontrado</p>
      </div>

      <!-- Password -->
      <div style="position:relative;">
        <label for="password" style="font-size:13px; font-weight:600; color:#374151; display:block; margin-bottom:5px;">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
               placeholder="••••••••"
               style="width:100%; padding:10px 14px; border:1.5px solid rgba(11,60,117,0.18); border-radius:8px; font-size:14px; font-family:Barlow,sans-serif; outline:none; transition:border-color 0.2s; box-sizing:border-box;"
               onfocus="this.style.borderColor='#00a4c8'" onblur="this.style.borderColor='rgba(11,60,117,0.18)'"/>
        <span id="togglePassword"
              style="position:absolute; right:12px; top:34px; font-size:12px; color:#00a4c8; font-weight:700; cursor:pointer; user-select:none;">Mostrar</span>
      </div>

      <!-- Recordar -->
      <div class="flex items-center justify-between mt-2">
        <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:#5b667a;">
          <input type="checkbox" name="remember" style="accent-color:#0b3c75;"/> Recuérdame
        </label>
      </div>

      <!-- Submit -->
      <button type="submit" style="
        width:100%; padding:12px; margin-top:4px;
        background: linear-gradient(135deg, #0b3c75, #00a4c8);
        color:#fff; font-weight:800; font-size:15px; font-family:Barlow,sans-serif;
        border:none; border-radius:8px; cursor:pointer;
        box-shadow: 0 4px 14px rgba(11,60,117,0.3);
        transition: opacity 0.2s;
      " onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        Iniciar Sesión →
      </button>
    </form>

    <p style="text-align:center; font-size:12px; color:#5b667a; margin-top:18px;">
      ¿No tienes cuenta?
      <a th:href="@{/user/create}" style="color:#0b3c75; font-weight:700; text-decoration:none;">Solicitar acceso</a>
    </p>
  </div>
</main>

<script>
(function(){
  var toggle = document.getElementById('togglePassword');
  var pwd = document.getElementById('password');
  if(toggle && pwd){
    toggle.addEventListener('click', function(){
      if(pwd.type==='password'){ pwd.type='text'; toggle.textContent='Ocultar'; }
      else { pwd.type='password'; toggle.textContent='Mostrar'; }
    });
  }

  var input = document.getElementById('email');
  var msg = document.getElementById('userCheck');
  var submitBtn = document.querySelector('#loginForm button[type="submit"]');
  if(input){
    input.addEventListener('blur', function(){
      var val = input.value.trim();
      if(!val){ if(msg) msg.style.display='none'; return; }
      fetch('/user/exists?email=' + encodeURIComponent(val))
        .then(function(r){ return r.json(); })
        .then(function(data){
          if(!data){ if(msg) msg.style.display='block'; if(submitBtn) submitBtn.disabled=true; }
          else { if(msg) msg.style.display='none'; if(submitBtn) submitBtn.disabled=false; }
        }).catch(function(){ if(msg) msg.style.display='none'; });
    });
  }
})();
</script>
</body>
</html>

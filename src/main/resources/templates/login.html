<!DOCTYPE html>
<html lang="es">
        <head th:replace="fragments/headers :: headers"></head>
    <body class="min-h-screen flex flex-col">
        <nav th:replace="fragments/navdar :: nav"></nav>
            <main class="flex flex-col items-center justify-center flex-1 bg-gradient-to-br from-gray-900 via-indigo-900 to-accent py-8">
                <div class="w-full max-w-md bg-white bg-opacity-80 rounded-xl shadow-xl p-8 backdrop-blur">
                    <div class="flex items-center mb-6">
                        <div class="mr-3">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="6" fill="#6c5ce7" opacity="0.12"/><path d="M6 12h12M6 8h12M6 16h8" stroke="#6c5ce7" stroke-opacity="0.9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </div>
                        <div>
                            <div class="text-2xl font-bold text-accent">INGRESO DE USUARIO</div>
                            <div class="text-sm text-gray-500">Accede a tu cuenta</div>
                        </div>
                    </div>
                    <h4 class="text-xl font-semibold mb-2 text-gray-800">Bienvenido</h4>
                    <p class="text-sm text-gray-500 mb-4">Introduce tus credenciales para seguir.</p>
                    
                    <!-- Mensajes de error/éxito -->
                    <div th:if="${error}" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg">
                        <span th:text="${error}">Error message</span>
                    </div>
                    <div th:if="${param.logout}" class="mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg">
                        Has cerrado sesión exitosamente.
                    </div>
                    <div th:if="${mensaje}" class="mb-4 p-3 bg-blue-100 border border-blue-400 text-blue-700 rounded-lg">
                        <span th:text="${mensaje}">Mensaje informativo</span>
                    </div>
                    
                    <form id="loginForm" action="/login" method="post" class="space-y-5">
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700">Usuario o correo</label>
                            <input type="text" id="username" name="username" required class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent bg-white text-gray-900" placeholder="Usuario" />
                            <p id="userCheck" class="text-sm text-red-600 mt-1" style="display:none">Usuario no encontrado</p>
                        </div>
                        <div class="relative">
                            <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                            <input type="password" id="password" name="password" required class="mt-1 block w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent bg-white text-gray-900" placeholder="Contraseña" />
                            <span class="absolute top-8 right-4 text-sm text-accent cursor-pointer select-none" id="togglePassword">Mostrar</span>
                        </div>
                                    
                                    <div class="flex items-center justify-between mt-4">
                                        <label class="flex items-center text-sm text-gray-600">
                                            <input type="checkbox" name="remember" class="mr-2 rounded" /> Recuérdame
                                        </label>
                                        <a href="#" class="text-sm text-accent hover:underline">¿Olvidaste la contraseña?</a>
                                    </div>
                                    <button type="submit" class="w-full py-3 rounded-lg bg-accent text-white font-bold text-lg shadow hover:bg-indigo-700 transition mt-2">Entrar</button>
                     </form>
                    <div class="text-center text-sm text-gray-500 mt-6">¿No tienes cuenta? <a href="/user/create" th:href="@{/user/create}" class="text-accent hover:underline">Regístrate</a></div>
                </div>
                <script>
                    // Toggle password visibility
                    (function(){
                        var toggle = document.getElementById('togglePassword');
                        var pwd = document.getElementById('password');
                        if(toggle && pwd){
                            toggle.addEventListener('click', function(){
                                if(pwd.type === 'password'){ pwd.type = 'text'; toggle.textContent = 'Ocultar'; }
                                else { pwd.type = 'password'; toggle.textContent = 'Mostrar'; }
                            });
                        }
                    })()

                    (function(){
                      // Consolidated script: user-exists check and submit interception
                      const toggle = document.getElementById('togglePassword');
                      const pwd = document.getElementById('password');
                      if(toggle && pwd){
                        toggle.addEventListener('click', ()=>{ if(pwd.type==='password'){ pwd.type='text'; toggle.textContent='Ocultar'; } else { pwd.type='password'; toggle.textContent='Mostrar'; }});
                      }

                      const input = document.getElementById('username');
                      const msg = document.getElementById('userCheck');
                      const submitBtn = document.querySelector('#loginForm button[type="submit"]');
                      if(input){
                        input.addEventListener('blur', function(){
                          const val = input.value.trim();
                          if(!val){ if(msg) msg.style.display='none'; if(submitBtn) submitBtn.disabled=false; return; }
                          fetch('/user/exists?email=' + encodeURIComponent(val)).then(r=>r.json()).then(data=>{
                            if(!data){ if(msg) msg.style.display='block'; if(submitBtn) submitBtn.disabled=true; }
                            else { if(msg) msg.style.display='none'; if(submitBtn) submitBtn.disabled=false; }
                          }).catch(()=>{ if(msg) msg.style.display='none'; if(submitBtn) submitBtn.disabled=false; });
                        });
                      }

                      const form = document.getElementById('loginForm');
                      if(form){
                        form.addEventListener('submit', function handler(e){
                          e.preventDefault();
                          const email = (document.getElementById('username')||{}).value.trim();
                          const password = (document.getElementById('password')||{}).value;
                          const ubicacionEl = document.getElementById('ubicacion');
                          const ubicacion = ubicacionEl ? ubicacionEl.value : '';
                          fetch('/user/validate?email=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password) + '&ubicacion=' + encodeURIComponent(ubicacion)).then(r=>r.json()).then(data=>{
                            if(data && data.redirect){ window.location.href = data.url; return; }
                            // fallback: submit normally
                            form.removeEventListener('submit', handler);
                            form.submit();
                          }).catch(()=>{ form.removeEventListener('submit', handler); form.submit(); });
                        });
                      }
                    })();
                </script>
            </main>
        <footer th:replace="fragments/footer :: footer"></footer>
    </body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/headers :: headers}"></head>
<body class="min-h-screen flex flex-col" style="font-family:'Barlow',sans-serif; color:#172134;
  background:
    radial-gradient(circle at 8% 12%, rgba(11,60,117,0.08), transparent 32%),
    radial-gradient(circle at 94% 5%, rgba(0,164,200,0.12), transparent 28%),
    linear-gradient(180deg,#edf3f9 0%,#e6edf5 55%,#dfe9f3 100%);">

<nav th:replace="~{fragments/navdar :: nav}"></nav>

<!-- Page Header (deep blue) -->
<div style="background:linear-gradient(90deg,#0f4c75,#1b6ca8); padding:22px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
  <div style="display:flex; align-items:center; gap:16px;">
    <a th:href="@{/dashboard}" style="color:rgba(255,255,255,0.75); font-size:13px; text-decoration:none; font-weight:600;">← Dashboard</a>
    <span style="color:rgba(255,255,255,0.4);">/</span>
    <span style="color:#ffffff; font-weight:800; font-size:15px;">📦 Inventario de Equipos</span>
    <span style="background:rgba(255,255,255,0.2); color:#fff; font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px;"
          th:text="${total} + ' registros'">0 registros</span>
  </div>
  <div style="display:flex; gap:10px;">
    <a href="/inventario/importar" style="background:rgba(255,255,255,0.15); color:#fff; font-size:13px; font-weight:700; padding:8px 16px; border-radius:7px; text-decoration:none; border:1px solid rgba(255,255,255,0.3);">📥 Importar Excel</a>
    <a href="/inventario/crear" style="background:#ffffff; color:#0f4c75; font-size:13px; font-weight:800; padding:8px 18px; border-radius:7px; text-decoration:none;">+ Nuevo</a>
  </div>
</div>

<main class="flex-1" style="padding:28px 24px; max-width:1200px; margin:0 auto; width:100%;">

  <!-- Alerts -->
  <div th:if="${success}" style="background:#d1fae5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin-bottom:16px; color:#065f46; font-weight:600; font-size:14px;">
    ✓ <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" style="background:#fee2e2; border:1px solid #fca5a5; border-radius:8px; padding:12px 16px; margin-bottom:16px; color:#7f1d1d; font-weight:600; font-size:14px;">
    ✗ <span th:text="${error}"></span>
  </div>

  <!-- Search + Filters -->
  <div class="dcim-card" style="padding:18px; margin-bottom:20px;">
    <form method="GET" action="/inventario/buscar" style="display:flex; gap:10px; margin-bottom:12px;">
      <input type="text" name="search" placeholder="Buscar por serie, tag, cliente, estado..."
             style="flex:1; padding:9px 14px; border:1.5px solid #d1d5db; border-radius:8px; font-size:13px; background:#fff; min-width:0;">
      <button type="submit" style="padding:9px 22px; background:linear-gradient(90deg,#0f4c75,#1b6ca8); color:#fff; font-weight:700; font-size:13px; border:none; border-radius:8px; cursor:pointer;">
        🔍 Buscar
      </button>
    </form>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <a href="/inventario" style="padding:5px 14px; background:#e5e7eb; border-radius:99px; font-size:12px; font-weight:700; color:#374151; text-decoration:none;">Todos</a>
      <a href="/inventario/filtrar/estado/Activo" style="padding:5px 14px; background:#d1fae5; border-radius:99px; font-size:12px; font-weight:700; color:#065f46; text-decoration:none;">Activo</a>
      <a href="/inventario/filtrar/estado/Inactivo" style="padding:5px 14px; background:#fee2e2; border-radius:99px; font-size:12px; font-weight:700; color:#7f1d1d; text-decoration:none;">Inactivo</a>
      <a href="/inventario/filtrar/estado/En%20Mantenimiento" style="padding:5px 14px; background:#fef3c7; border-radius:99px; font-size:12px; font-weight:700; color:#92400e; text-decoration:none;">En Mantenimiento</a>
    </div>
  </div>

  <!-- Table card -->
  <div class="dcim-card" style="overflow:hidden;">
    <div class="card-band" style="background:linear-gradient(90deg,#0f4c75,#1b6ca8)"></div>
    <div style="overflow-x:auto;">
      <table style="width:100%; border-collapse:collapse;">
        <thead>
          <tr style="background:linear-gradient(90deg,#0f4c75,#1b6ca8);">
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">ID</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Número Serie</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Tag</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Sitio</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Tipo</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Marca</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Modelo</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Estado</th>
            <th style="padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">IP</th>
            <th style="padding:11px 14px; text-align:center; font-size:11px; font-weight:800; color:rgba(255,255,255,0.85); text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="inv : ${inventarios}"
              style="border-bottom:1px solid #f1f5f9; transition:background 0.15s;"
              onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
            <td style="padding:10px 14px; font-size:13px; color:#5b667a;" th:text="${inv.id}">-</td>
            <td style="padding:10px 14px; font-size:12px; font-family:monospace; color:#172134; font-weight:600;" th:text="${inv.numeroSerie}">-</td>
            <td style="padding:10px 14px; font-size:13px;" th:text="${inv.tag}">-</td>
            <td style="padding:10px 14px; font-size:13px;" th:text="${inv.sitio}">-</td>
            <td style="padding:10px 14px; font-size:13px;" th:text="${inv.tipo}">-</td>
            <td style="padding:10px 14px; font-size:13px;" th:text="${inv.marca}">-</td>
            <td style="padding:10px 14px; font-size:13px;" th:text="${inv.modelo}">-</td>
            <td style="padding:10px 14px;">
              <span th:text="${inv.estado}"
                    th:style="${inv.estado == 'Activo'} ? 'background:#d1fae5;color:#065f46;' : (${inv.estado == 'Inactivo'} ? 'background:#fee2e2;color:#7f1d1d;' : 'background:#fef3c7;color:#92400e;')"
                    style="padding:3px 10px; border-radius:99px; font-size:11px; font-weight:700;">-</span>
            </td>
            <td style="padding:10px 14px; font-size:12px; font-family:monospace; color:#5b667a;" th:text="${inv.direccionIp}">-</td>
            <td style="padding:10px 14px; text-align:center;">
              <div style="display:flex; justify-content:center; gap:8px;">
                <a th:href="@{/inventario/{id}(id=${inv.id})}" style="font-size:12px; color:#1b6ca8; font-weight:700; text-decoration:none;" title="Ver">👁️</a>
                <a th:href="@{/inventario/editar/{id}(id=${inv.id})}" style="font-size:12px; color:#d97706; font-weight:700; text-decoration:none;" title="Editar">✏️</a>
                <a th:href="@{/inventario/eliminar/{id}(id=${inv.id})}" onclick="return confirm('¿Estás seguro de eliminar este registro?')" style="font-size:12px; color:#dc2626; font-weight:700; text-decoration:none;" title="Eliminar">🗑️</a>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(inventarios)}">
            <td colspan="10" style="padding:36px; text-align:center; color:#9ca3af; font-size:14px;">Sin registros de inventario</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/headers :: headers}"></head>
<body>
  <nav th:replace="~{fragments/navdar :: nav}"></nav>

  <div class="container mx-auto py-8 px-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-4xl font-bold text-gray-800">Inventario de Equipos</h1>
        <p class="text-gray-600 mt-2">Total de registros: <span class="font-semibold text-blue-600" th:text="${total}">0</span></p>
      </div>
      <div class="flex gap-3">
        <a href="/inventario/crear" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">+ Nuevo</a>
        <a href="/inventario/importar" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">📥 Importar Excel</a>
      </div>
    </div>

    <!-- Alertas -->
    <div th:if="${success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
      <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      <span th:text="${error}"></span>
    </div>

    <!-- Búsqueda -->
    <div class="mb-6">
      <form method="GET" action="/inventario/buscar" class="flex gap-2">
        <input type="text" name="search" placeholder="Buscar por serie, tag, cliente, estado..." 
               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Buscar</button>
      </form>
    </div>

    <!-- Filtros rápidos -->
    <div class="mb-6 flex gap-2 flex-wrap">
      <a href="/inventario" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Todo</a>
      <a href="/inventario/filtrar/estado/Activo" class="px-4 py-2 bg-green-200 rounded hover:bg-green-300">Activo</a>
      <a href="/inventario/filtrar/estado/Inactivo" class="px-4 py-2 bg-red-200 rounded hover:bg-red-300">Inactivo</a>
      <a href="/inventario/filtrar/estado/En%20Mantenimiento" class="px-4 py-2 bg-yellow-200 rounded hover:bg-yellow-300">En Mantenimiento</a>
    </div>

    <!-- Tabla de inventarios -->
    <div class="overflow-x-auto bg-white rounded-lg shadow">
      <table class="w-full">
        <thead class="bg-blue-600 text-white">
          <tr>
            <th class="px-4 py-3 text-left">ID</th>
            <th class="px-4 py-3 text-left">Número Serie</th>
            <th class="px-4 py-3 text-left">Tag</th>
            <th class="px-4 py-3 text-left">Sitio</th>
            <th class="px-4 py-3 text-left">Tipo</th>
            <th class="px-4 py-3 text-left">Marca</th>
            <th class="px-4 py-3 text-left">Modelo</th>
            <th class="px-4 py-3 text-left">Estado</th>
            <th class="px-4 py-3 text-left">IP</th>
            <th class="px-4 py-3 text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="inv : ${inventarios}" class="border-b hover:bg-gray-50">
            <td class="px-4 py-3 text-sm" th:text="${inv.id}">-</td>
            <td class="px-4 py-3 text-sm font-mono" th:text="${inv.numeroSerie}">-</td>
            <td class="px-4 py-3 text-sm" th:text="${inv.tag}">-</td>
            <td class="px-4 py-3 text-sm" th:text="${inv.sitio}">-</td>
            <td class="px-4 py-3 text-sm" th:text="${inv.tipo}">-</td>
            <td class="px-4 py-3 text-sm" th:text="${inv.marca}">-</td>
            <td class="px-4 py-3 text-sm" th:text="${inv.modelo}">-</td>
            <td class="px-4 py-3 text-sm">
              <span class="px-2 py-1 rounded text-white text-xs"
                    th:classappend="${inv.estado == 'Activo'} ? 'bg-green-600' : ${inv.estado == 'Inactivo'} ? 'bg-red-600' : 'bg-yellow-600'"
                    th:text="${inv.estado}">-</span>
            </td>
            <td class="px-4 py-3 text-sm font-mono" th:text="${inv.direccionIp}">-</td>
            <td class="px-4 py-3 text-center">
              <div class="flex justify-center gap-2">
                <a th:href="@{/inventario/{id}(id=${inv.id})}" class="text-blue-600 hover:text-blue-800">👁️ Ver</a>
                <a th:href="@{/inventario/editar/{id}(id=${inv.id})}" class="text-yellow-600 hover:text-yellow-800">✏️ Editar</a>
                <a th:href="@{/inventario/eliminar/{id}(id=${inv.id})}" onclick="return confirm('¿Estás seguro?')" class="text-red-600 hover:text-red-800">🗑️ Eliminar</a>
              </div>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(inventarios)}">
            <td colspan="10" class="px-4 py-6 text-center text-gray-500">No hay registros</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>

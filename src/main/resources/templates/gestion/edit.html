<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Gestión</title>
    <div th:replace="fragments/headers :: headers"></div>
  </head>
  <body class="bg-gray-100">
    <div th:replace="fragments/navdar :: nav"></div>
    <div th:replace="fragments/dashboard-button :: button-compact"></div>

    <div class="container mx-auto px-4 py-8">
      <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">
          <i class="fas fa-edit mr-2 text-accent"></i>Editar Gestión de Acceso
        </h1>

        <form th:action="@{/gestion/update/{id}(id=${gestion.id})}" th:object="${gestion}" method="post">
          <input type="hidden" th:field="*{fechaRegistro}">
          <input type="hidden" th:field="*{horaRegistro}">
          <input type="hidden" th:field="*{usuarioIngresa}">
          
          <div class="bg-gray-50 p-4 rounded-lg mb-4">
            <h3 class="font-semibold text-gray-800 mb-3">Información del Ticket</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Número de Ticket *</label>
                <input type="text" th:field="*{numeroTicket}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Sitio *</label>
                <select th:field="*{sitio}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
                  <option value="DC San Martin">DC San Martin</option>
                  <option value="DC Apoquindo">DC Apoquindo</option>
                  <option value="MC La Florida">MC La Florida</option>
                  <option value="MC Chiloé">MC Chiloé</option>
                  <option value="MC Independencia">MC Independencia</option>
                  <option value="MC Providencia">MC Providencia</option>
                  <option value="MC Pedro de Valdivia">MC Pedro de Valdivia</option>
                  <option value="MC Manuel Montt">MC Manuel Montt</option>
                </select>
              </div>
            </div>
          </div>

          <div class="bg-teal-50 p-4 rounded-lg mb-4">
            <h3 class="font-semibold text-gray-800 mb-3">Programación</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Fecha Inicio *</label>
                <input type="date" th:field="*{fechaInicioActividad}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Hora Inicio *</label>
                <input type="time" th:field="*{horaInicioActividad}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Fecha Término *</label>
                <input type="date" th:field="*{fechaTerminoActividad}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Hora Término *</label>
                <input type="time" th:field="*{horaTerminoActividad}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Actividad *</label>
              <textarea th:field="*{nombreActividad}" required rows="3" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2"></textarea>
            </div>
          </div>

          <div class="bg-yellow-50 p-4 rounded-lg mb-4">
            <h3 class="font-semibold text-gray-800 mb-3">Estado</h3>
            <div class="grid grid-cols-2 gap-4 mb-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Estado *</label>
                <select th:field="*{estadoAprobacion}" required class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Aprobada">Aprobada</option>
                  <option value="Rechazada por NXT">Rechazada por NXT</option>
                  <option value="Devuelta al cliente por falta de Datos">Devuelta por falta de datos</option>
                </select>
              </div>
              <div>
                <label class="inline-flex items-center mt-7">
                  <input type="checkbox" th:field="*{gestionRealizada}" class="rounded border-gray-300">
                  <span class="ml-2 text-sm">Gestión realizada</span>
                </label>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Aprobadores Pendientes</label>
              <textarea th:field="*{aprobadoresPendientes}" rows="2" class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2"></textarea>
            </div>
          </div>

          <div class="flex justify-end space-x-4">
            <a href="/gestion/list" class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">Cancelar</a>
            <button type="submit" class="px-6 py-2 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-lg hover:shadow-lg">
              <i class="fas fa-save mr-2"></i>Actualizar
            </button>
          </div>
        </form>
      </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
  </body>
</html>

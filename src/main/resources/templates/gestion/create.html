<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Gestión de Acceso</title>
    <div th:replace="fragments/headers :: headers"></div>
  </head>
  <body class="bg-gray-100">
    <div th:replace="fragments/navdar :: nav"></div>

    <div th:replace="fragments/dashboard-button :: button-compact"></div>

    <div class="container mx-auto px-4 py-8">
      <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <!-- Encabezado -->
        <div class="mb-6">
          <h1 class="text-3xl font-bold text-gray-800">
            <i class="fas fa-plus-circle mr-2 text-accent"></i>
            Nueva Gestión de Acceso
          </h1>
          <p class="text-gray-600 mt-2">Complete el formulario para registrar una nueva gestión de acceso al data center</p>
        </div>

        <!-- Formulario -->
        <form th:action="@{/gestion/save}" th:object="${gestion}" method="post">
          
          <!-- Información de Registro -->
          <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
              <i class="fas fa-info-circle mr-2"></i>Información de Registro
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                  <i class="fas fa-calendar mr-1"></i>Fecha Registro
                </label>
                <div class="bg-white border-2 border-blue-300 rounded-lg px-4 py-3 font-semibold text-gray-800">
                  <span th:text="${#temporals.format(gestion.fechaRegistro, 'dd/MM/yyyy')}">25/11/2025</span>
                </div>
                <input type="hidden" th:field="*{fechaRegistro}">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                  <i class="fas fa-clock mr-1"></i>Hora Registro
                </label>
                <div class="bg-white border-2 border-blue-300 rounded-lg px-4 py-3 font-semibold text-gray-800">
                  <span th:text="${#temporals.format(gestion.horaRegistro, 'HH:mm:ss')}">17:45:30</span>
                </div>
                <input type="hidden" th:field="*{horaRegistro}">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                  <i class="fas fa-user mr-1"></i>Usuario
                </label>
                <div class="bg-white border-2 border-blue-300 rounded-lg px-4 py-3 font-semibold text-gray-800">
                  <span th:text="${gestion.usuarioIngresa}">Usuario Actual</span>
                </div>
                <input type="hidden" th:field="*{usuarioIngresa}">
              </div>
            </div>
          </div>

          <!-- Información del Ticket -->
          <div class="bg-gray-50 p-4 rounded-lg mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
              <i class="fas fa-ticket-alt mr-2"></i>Información del Ticket
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Número de Ticket <span class="text-red-500">*</span></label>
                <input type="text" th:field="*{numeroTicket}" required 
                       placeholder="Ej: CRQ0012345"
                       class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Sitio <span class="text-red-500">*</span></label>
                <select th:field="*{sitio}" required 
                        class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
                  <option value="">Seleccione sitio</option>
                  <option value="DC San Martin">DC San Martin</option>
                  <option value="DC Apoquindo">DC Apoquindo</option>
                  <option value="MC La Florida">MC La Florida</option>
                  <option value="MC Chiloé">MC Chiloé</option>
                  <option value="MC Independencia">MC Independencia</option>
                  <option value="MC Providencia">MC Providencia</option>
                  <option value="MC Pedro de Valdivia">MC Pedro de Valdivia</option>
                  <option value="MC Manuel Montt">MC Manuel Montt</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Programación de Actividad -->
          <div class="bg-teal-50 p-4 rounded-lg mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
              <i class="fas fa-calendar-alt mr-2"></i>Programación de Actividad
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Fecha Inicio <span class="text-red-500">*</span></label>
                <input type="date" th:field="*{fechaInicioActividad}" required 
                       class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Hora Inicio <span class="text-red-500">*</span></label>
                <input type="time" th:field="*{horaInicioActividad}" required 
                       class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Fecha Término <span class="text-red-500">*</span></label>
                <input type="date" th:field="*{fechaTerminoActividad}" required 
                       class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Hora Término <span class="text-red-500">*</span></label>
                <input type="time" th:field="*{horaTerminoActividad}" required 
                       class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Nombre de la Actividad <span class="text-red-500">*</span></label>
              <textarea th:field="*{nombreActividad}" required rows="3"
                        placeholder="Descripción detallada de la actividad a realizar..."
                        class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent"></textarea>
            </div>
          </div>

          <!-- Estado y Aprobadores -->
          <div class="bg-yellow-50 p-4 rounded-lg mb-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-3">
              <i class="fas fa-users mr-2"></i>Aprobación y Estado
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label class="block text-sm font-medium text-gray-700">Estado de Aprobación <span class="text-red-500">*</span></label>
                <select th:field="*{estadoAprobacion}" required 
                        class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent">
                  <option value="Pendiente">Pendiente</option>
                  <option value="Aprobada">Aprobada</option>
                  <option value="Rechazada por NXT">Rechazada por NXT</option>
                  <option value="Devuelta al cliente por falta de Datos">Devuelta al cliente por falta de Datos</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700">Gestión Realizada</label>
                <div class="mt-3">
                  <label class="inline-flex items-center">
                    <input type="checkbox" th:field="*{gestionRealizada}" 
                           class="rounded border-gray-300 text-accent focus:ring-accent">
                    <span class="ml-2 text-sm text-gray-700">La gestión ha sido realizada</span>
                  </label>
                </div>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Aprobadores Pendientes</label>
              <textarea th:field="*{aprobadoresPendientes}" rows="2"
                        placeholder="Ej: Paulo Hernandez, Rodrigo Aguilera, Facilities"
                        class="mt-1 block w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-accent"></textarea>
              <small class="text-gray-500 text-xs">Separe los nombres con comas</small>
            </div>
          </div>

          <!-- Botones -->
          <div class="flex justify-end space-x-4">
            <a href="/gestion/list" 
               class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 transition-colors">
              <i class="fas fa-times mr-2"></i>Cancelar
            </a>
            <button type="submit" 
                    class="px-6 py-2 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-lg hover:shadow-lg transition-all duration-300">
              <i class="fas fa-save mr-2"></i>Guardar Gestión
            </button>
          </div>
        </form>
      </div>
    </div>

    <footer th:replace="fragments/footer :: footer"></footer>
  </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/headers :: headers}"></head>
<body class="bg-gray-100">
    <nav th:replace="~{fragments/navdar :: nav}"></nav>

    <div class="container mx-auto px-4 py-8 space-y-6 max-w-6xl">

        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Planos de Sala Técnica</h1>
                <p class="text-gray-600">Defina las dimensiones de cada sala (cuadrícula de 60×60 cm)</p>
            </div>
            <a href="/dashboard" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded">
                ← Dashboard
            </a>
        </div>

        <!-- Alertas -->
        <div th:if="${success}" class="bg-green-100 border border-green-300 text-green-800 px-4 py-3 rounded"
             th:text="${success}"></div>
        <div th:if="${error}" class="bg-red-100 border border-red-300 text-red-800 px-4 py-3 rounded"
             th:text="${error}"></div>

        <!-- Formulario de creación -->
        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Nuevo Plano</h2>
            <form method="post" action="/plano-sala/guardar" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div>
                    <label class="block text-sm font-semibold mb-1">Sala <span class="text-red-600">*</span></label>
                    <select name="salaId" required class="w-full px-3 py-2 border rounded">
                        <option value="">Seleccione sala</option>
                        <option th:each="sala : ${salas}"
                                th:value="${sala.id}"
                                th:text="${sala.sitio.nombre + ' › ' + sala.nombre}"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Columnas (Oeste→Este) <span class="text-gray-500 text-xs">letras A, B, C…</span>
                    </label>
                    <div class="flex items-center gap-2">
                        <input type="number" name="cantidadColumnas" min="1" max="100" required
                               placeholder="Ej: 18"
                               class="w-full px-3 py-2 border rounded">
                        <span class="text-xs text-gray-500 whitespace-nowrap">× 60 cm</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">
                        Filas (Norte→Sur) <span class="text-gray-500 text-xs">números 1, 2, 3…</span>
                    </label>
                    <div class="flex items-center gap-2">
                        <input type="number" name="cantidadFilas" min="1" max="100" required
                               placeholder="Ej: 19"
                               class="w-full px-3 py-2 border rounded">
                        <span class="text-xs text-gray-500 whitespace-nowrap">× 60 cm</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1">Descripción</label>
                    <input type="text" name="descripcion" maxlength="255" placeholder="Opcional"
                           class="w-full px-3 py-2 border rounded">
                </div>

                <div class="md:col-span-2 lg:col-span-4 flex justify-end">
                    <button type="submit"
                            class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-2 rounded font-semibold">
                        Crear Plano
                    </button>
                </div>
            </form>
        </div>

        <!-- Lista de planos existentes -->
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="px-6 py-4 border-b">
                <h2 class="text-xl font-semibold">Planos Creados</h2>
            </div>
            <table class="w-full text-sm">
                <thead class="bg-blue-600 text-white">
                    <tr>
                        <th class="px-4 py-3 text-left">Sitio</th>
                        <th class="px-4 py-3 text-left">Sala</th>
                        <th class="px-4 py-3 text-center">Columnas</th>
                        <th class="px-4 py-3 text-center">Filas</th>
                        <th class="px-4 py-3 text-center">Dimensiones (m)</th>
                        <th class="px-4 py-3 text-center">Área (m²)</th>
                        <th class="px-4 py-3 text-left">Descripción</th>
                        <th class="px-4 py-3 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${planos}" class="border-b hover:bg-gray-50">
                        <td class="px-4 py-3" th:text="${p.sala?.sitio?.nombre}">-</td>
                        <td class="px-4 py-3 font-semibold" th:text="${p.sala?.nombre}">-</td>
                        <td class="px-4 py-3 text-center">
                            <span class="font-mono" th:text="${p.cantidadColumnas}"></span>
                            <span class="text-gray-500 text-xs" th:text="' (' + (p.cantidadColumnas * 0.6) + ' m)'"></span>
                        </td>
                        <td class="px-4 py-3 text-center">
                            <span class="font-mono" th:text="${p.cantidadFilas}"></span>
                            <span class="text-gray-500 text-xs" th:text="' (' + (p.cantidadFilas * 0.6) + ' m)'"></span>
                        </td>
                        <td class="px-4 py-3 text-center text-xs font-mono text-gray-700"
                            th:text="${#numbers.formatDecimal(p.cantidadColumnas * 0.6, 1, 1)} + ' × ' + ${#numbers.formatDecimal(p.cantidadFilas * 0.6, 1, 1)}"></td>
                        <td class="px-4 py-3 text-center font-semibold text-blue-700"
                            th:text="${#numbers.formatDecimal(p.cantidadColumnas * 0.6 * p.cantidadFilas * 0.6, 1, 2)} + ' m²'"></td>
                        <td class="px-4 py-3 text-gray-600" th:text="${p.descripcion ?: '-'}">-</td>
                        <td class="px-4 py-3 text-center">
                            <div class="flex justify-center gap-2">
                                <a th:href="@{/plano-sala/{id}(id=${p.id})}"
                                   class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-xs">
                                    🗺️ Ver Plano
                                </a>
                                <a th:href="@{/plano-sala/eliminar/{id}(id=${p.id})}"
                                   onclick="return confirm('¿Eliminar este plano?')"
                                   class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-xs">
                                    🗑️
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(planos)}">
                        <td colspan="8" class="px-4 py-8 text-center text-gray-500">
                            No hay planos creados aún. Cree el primero arriba.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/headers :: headers"></head>
  <body>
    <nav th:replace="~{fragments/navdar :: nav}"></nav>
    <style>
      /* Static 3D card look in Telefónica colors */
      .card-3d {
        background: linear-gradient(180deg,#ffffff 0%, #f4fbff 100%);
        border-radius: 14px;
        box-shadow: 0 20px 50px rgba(0,61,165,0.12), inset 0 -8px 18px rgba(0,0,0,0.02);
        border: 1px solid rgba(0,61,165,0.08);
        color: #002B5C;
      }
      .table-3d thead tr { background: linear-gradient(180deg,#eaf6ff 0%, #dff3ff 100%); }
      .table-3d th { color: #003DA5; font-weight:700; }
      .table-3d td { background: transparent; }
      .btn-3d { background: linear-gradient(90deg,#003DA5,#00A1E6); color:#fff; padding:.45rem .7rem; border-radius:10px; border:none; }
      /* explicitly disable motion */
      .no-motion { transition: none !important; animation: none !important; }
    </style>
    <main class="max-w-5xl mx-auto p-6">
      <div class="card-3d no-motion p-6">
        <h1 class="text-2xl font-bold mb-4">Listado de usuarios</h1>
        <table class="min-w-full table-auto border-collapse table-3d">
          <thead>
            <tr class="bg-gray-100">
              <th class="px-4 py-2 text-left">#</th>
              <th class="px-4 py-2 text-left">Nombre</th>
              <th class="px-4 py-2 text-left">Apellido</th>
              <th class="px-4 py-2 text-left">Email</th>
              <th class="px-4 py-2 text-left">RUT</th>
              <th class="px-4 py-2 text-left">Contraseña</th>
              <th class="px-4 py-2 text-left">Rol</th>
              <th class="px-4 py-2 text-left">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="u, iterStat : ${usuarios}">
              <td class="px-4 py-2" th:text="${iterStat.count}">1</td>
              <td class="px-4 py-2" th:text="${u['nombre']}">Nombre</td>
              <td class="px-4 py-2" th:text="${u['apellido']}">Apellido</td>
              <td class="px-4 py-2" th:text="${u['email']}">email@example.com</td>
              <td class="px-4 py-2" th:text="${u['rut']}">rut</td>
              <td class="px-4 py-2" th:text="${u['password']}">******</td>
              <td class="px-4 py-2">
                <span th:text="${u['rol']}" th:classappend="${u['rol'] == 'ADMIN'} ? ' text-red-600 font-semibold' : (${u['rol'] == 'VIEWER'} ? ' text-orange-600 font-semibold' : ' text-gray-700')">ROLE</span>
              </td>
              <td class="px-4 py-2 flex items-center gap-3">
                <!-- Always show edit icon -->
                <a th:href="@{/user/update(idx=${iterStat.index})}" title="Editar" class="text-[#003DA5] hover:text-[#005ea8]">
                  <!-- pencil icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 113 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
                </a>
                <!-- Always show delete icon -->
                <a th:href="@{/user/delete(idx=${iterStat.index})}" title="Eliminar" class="text-red-600 hover:text-red-800" onclick="return confirm('¿Eliminar usuario?');">
                  <!-- trash icon -->
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m5 0V4a2 2 0 012-2h2a2 2 0 012 2v2"/></svg>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script>
      function goToIngreso(btn){
        if(!btn) return;
        const nombre = btn.getAttribute('data-nombre') || '';
        const rut = btn.getAttribute('data-rut') || '';
        const url = '/ingreso?nombre=' + encodeURIComponent(nombre) + '&rut=' + encodeURIComponent(rut);
        window.location.href = url;
      }
    </script>
  </body>
</html>

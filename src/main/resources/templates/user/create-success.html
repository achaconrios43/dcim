<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/headers :: headers}"></th:block>
    <title>Usuario Creado</title>
</head>
<body class="animate-fadeIn">
    <nav th:replace="~{fragments/navdar :: nav}"></nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="glass-card p-4">
                    <div class="text-center mb-4">
                        <h1 class="text-gradient">¡Usuario Creado!</h1>
                        <p class="text-muted">El usuario se ha registrado correctamente</p>
                    </div>

                    <div class="alert-modern alert-success">
                        <strong>✓ Proceso completado exitosamente</strong>
                    </div>

                    <div class="dashboard-card mb-4">
                        <h4 class="mb-3">Detalles del Usuario</h4>
                        <div class="row">
                            <div class="col-6">
                                <p><strong>Usuario:</strong></p>
                                <p class="text-primary" th:text="${usuario.usuario}">username</p>
                            </div>
                            <div class="col-6">
                                <p><strong>Correo:</strong></p>
                                <p class="text-primary" th:text="${usuario.email}">email@domain.com</p>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-6">
                                <p><strong>Rol:</strong></p>
                                <p class="text-primary" th:text="${usuario.rol}">USER</p>
                            </div>
                            <div class="col-6">
                                <p><strong>Activo:</strong></p>
                                <p class="text-primary" th:text="${usuario.activo ? 'Sí' : 'No'}">Sí</p>
                            </div>
                        </div>
                    </div>

                    <div class="text-center">
                        <a th:href="@{/usuario/list}" class="btn-modern btn-success me-2">
                            Ver Lista de Usuarios
                        </a>
                        <a th:href="@{/usuario/create}" class="btn-modern btn-secondary">
                            Crear Otro Usuario
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
  </body>
</html>

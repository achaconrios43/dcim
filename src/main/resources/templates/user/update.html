<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/headers :: headers"></head>
  <body>
    <nav th:replace="~{fragments/navdar :: nav}"></nav>

    <main class="page-wrap max-w-3xl mx-auto p-6">
      <div class="card-3d p-6">
        <h1 class="text-2xl font-bold mb-4" style="color:var(--tf-blue);">Editar Usuario</h1>
        <form th:action="@{/user/update}" method="post" class="space-y-4" id="updateUserForm">
          <input type="hidden" name="idx" th:value="${idx}" />

          <div>
            <label class="block text-sm font-medium text-gray-700">Nombre</label>
            <input name="nombre" type="text" required class="mt-1 block w-full rounded-md input-3d" th:value="${usuario['nombre']}" placeholder="Nombre" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Apellido</label>
            <input name="apellido" type="text" required class="mt-1 block w-full rounded-md input-3d" th:value="${usuario['apellido']}" placeholder="Apellido" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input name="email" type="email" required class="mt-1 block w-full rounded-md input-3d" th:value="${usuario['email']}" placeholder="email@example.com" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Contraseña</label>
            <input name="password" id="password" type="password" required class="mt-1 block w-full rounded-md input-3d" th:value="${usuario['password']}" placeholder="Contraseña" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">RUT</label>
            <input name="rut" id="rut" type="text" required class="mt-1 block w-full rounded-md input-3d" th:value="${usuario['rut']}" placeholder="Ej: 12.345.678-9" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700">Rol</label>
            <select name="rol" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm">
              <option th:selected="${usuario['rol']=='USER'}" value="USER">USER</option>
              <option th:selected="${usuario['rol']=='ADMIN'}" value="ADMIN">ADMIN</option>
            </select>
          </div>

          <div class="flex items-center justify-between">
            <button type="submit" class="btn-3d">Guardar cambios</button>
            <a th:href="@{/user/list}" class="text-sm text-gray-600 hover:underline">Cancelar</a>
          </div>
        </form>
      </div>
    </main>

  </body>
</html>

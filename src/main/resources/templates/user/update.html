<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/headers :: headers"></head>
  <body style="background:#f0f4f8; min-height:100vh;">
    <nav th:replace="~{fragments/navdar :: nav}"></nav>

    <main style="max-width:760px; margin:2.5rem auto; padding:0 1rem;">

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
        <div>
          <h1 style="font-size:1.5rem; font-weight:700; color:#003DA5; margin:0 0 .2rem;">Editar Usuario</h1>
          <p style="font-size:.85rem; color:#64748b; margin:0;" th:text="'ID: ' + ${usuario.id} + '  ' + ${usuario.nombre} + ' ' + ${usuario.apellido}"></p>
        </div>
        <a th:href="@{/dashboard}" style="display:inline-flex; align-items:center; gap:.4rem; padding:.5rem 1rem; border-radius:8px; background:linear-gradient(90deg,#003DA5,#00A1E6); color:#fff; font-size:.85rem; font-weight:600; text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Volver al Dashboard
        </a>
      </div>

      <div th:if="${errorMessage}" style="display:flex; align-items:center; gap:.75rem; padding:.9rem 1.1rem; border-radius:10px; background:#fef2f2; border:1px solid #fecaca; margin-bottom:1.25rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span style="color:#b91c1c; font-size:.875rem; font-weight:500;" th:text="${errorMessage}"></span>
      </div>

      <form th:action="@{'/user/update/' + ${usuario.id}}" method="post" style="display:flex; flex-direction:column; gap:1.25rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Datos basicos -->
        <div style="background:#fff; border-radius:12px; border:1px solid #e2e8f0; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden;">
          <div style="padding:.85rem 1.25rem; background:#f8fafc; border-bottom:1px solid #e2e8f0;">
            <span style="font-size:.8rem; font-weight:700; color:#003DA5; text-transform:uppercase; letter-spacing:.05em;">Datos de la cuenta</span>
          </div>
          <div style="padding:1.25rem; display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">Nombre</label>
              <input name="nombre" type="text" required th:value="${usuario.nombre}" placeholder="Nombre" style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'" />
            </div>
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">Apellido</label>
              <input name="apellido" type="text" required th:value="${usuario.apellido}" placeholder="Apellido" style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'" />
            </div>
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">Email</label>
              <input name="email" type="email" required th:value="${usuario.email}" placeholder="email@ejemplo.com" style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'" />
            </div>
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">RUT</label>
              <input name="rut" type="text" required th:value="${usuario.rut}" placeholder="12.345.678-9" style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'" />
            </div>
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">
                Contrasena <span style="font-weight:400; color:#9ca3af;">(en blanco = sin cambio)</span>
              </label>
              <input name="password" type="password" placeholder="Nueva contrasena" style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'" />
            </div>
            <div>
              <label style="display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:.35rem;">Rol</label>
              <select id="rolSelect" name="rol" required style="width:100%; box-sizing:border-box; padding:.55rem .75rem; border-radius:8px; border:1px solid #d1d5db; font-size:.875rem; color:#111827; background:#fff; outline:none;" onfocus="this.style.borderColor='#003DA5'" onblur="this.style.borderColor='#d1d5db'">
                <option value="USER"   th:selected="${usuario.rol == 'USER'}">USER</option>
                <option value="ADMIN"  th:selected="${usuario.rol == 'ADMIN'}">ADMIN</option>
                <option value="VIEWER" th:selected="${usuario.rol == 'VIEWER'}">VIEWER</option>
                <option value="CLIENTE" th:selected="${usuario.rol == 'CLIENTE'}">CLIENTE</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Modulos permitidos -->
        <div th:with="mods=${usuario.modulosPermitidos != null ? usuario.modulosPermitidos : ''}"
             style="background:#fff; border-radius:12px; border:1px solid #e2e8f0; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden;">
          <div style="padding:.85rem 1.25rem; background:#f8fafc; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; justify-content:space-between;">
            <span style="font-size:.8rem; font-weight:700; color:#003DA5; text-transform:uppercase; letter-spacing:.05em;">Modulos permitidos</span>
            <span id="adminBadge" style="display:none; font-size:.75rem; font-weight:600; color:#fff; background:#003DA5; padding:.15rem .6rem; border-radius:99px;">ADMIN — todos activos</span>
          </div>
          <div style="padding:1.25rem; display:flex; flex-direction:column; gap:1.1rem;">

            <!-- DASHBOARD / ESTADISTICA -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Dashboard / Estadistica</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="dashboard.principal" th:checked="${#strings.contains(mods,'dashboard.principal')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Dashboard principal
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="dashboard.cliente" th:checked="${#strings.contains(mods,'dashboard.cliente')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Dashboard cliente
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="dashboard.diario" th:checked="${#strings.contains(mods,'dashboard.diario')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Estadistica diaria
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="dashboard.mensual" th:checked="${#strings.contains(mods,'dashboard.mensual')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Estadistica mensual
                </label>
              </div>
            </div>

            <!-- INGRESOS AP -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Ingresos AP</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="ingresos.formulario" th:checked="${#strings.contains(mods,'ingresos.formulario')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Formulario de ingreso
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="ingresos.lista" th:checked="${#strings.contains(mods,'ingresos.lista')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Lista de ingresos
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="ingresos.leer" th:checked="${#strings.contains(mods,'ingresos.leer')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver detalle ingreso
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="ingresos.editar" th:checked="${#strings.contains(mods,'ingresos.editar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Editar ingreso
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="ingresos.eliminar" th:checked="${#strings.contains(mods,'ingresos.eliminar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Eliminar ingreso
                </label>
              </div>
            </div>

            <!-- INVENTARIO -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Inventario</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#0f766e; font-weight:600; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.layout_vertical" th:checked="${#strings.contains(mods,'inventario.layout_vertical')}" style="accent-color:#0f766e; width:14px; height:14px;" />
                  Layout Vertical (cliente)
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.ver" th:checked="${#strings.contains(mods,'inventario.ver')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver inventario
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.buscar" th:checked="${#strings.contains(mods,'inventario.buscar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Buscar equipos
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.crear" th:checked="${#strings.contains(mods,'inventario.crear')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Crear equipo
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.editar" th:checked="${#strings.contains(mods,'inventario.editar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Editar equipo
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="inventario.importar" th:checked="${#strings.contains(mods,'inventario.importar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Importar inventario
                </label>
              </div>
            </div>

            <!-- TEMPERATURAS -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Temperaturas</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="temperaturas.ver" th:checked="${#strings.contains(mods,'temperaturas.ver')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver temperaturas
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="temperaturas.registro" th:checked="${#strings.contains(mods,'temperaturas.registro')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Registro de mediciones
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="temperaturas.exportar" th:checked="${#strings.contains(mods,'temperaturas.exportar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Exportar Excel
                </label>
              </div>
            </div>

            <!-- PLANOS DE SALA -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Planos de Sala</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="planos.ver" th:checked="${#strings.contains(mods,'planos.ver')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver planos
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="planos.editar" th:checked="${#strings.contains(mods,'planos.editar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Editar plano
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="planos.plantillas" th:checked="${#strings.contains(mods,'planos.plantillas')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Plantillas de plano
                </label>
              </div>
            </div>

            <!-- GESTION -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Gestion de Accesos</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="gestion.ver" th:checked="${#strings.contains(mods,'gestion.ver')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver registros
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="gestion.crear" th:checked="${#strings.contains(mods,'gestion.crear')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Crear registro
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="gestion.editar" th:checked="${#strings.contains(mods,'gestion.editar')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Editar registro
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="gestion.detalle" th:checked="${#strings.contains(mods,'gestion.detalle')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver detalle
                </label>
              </div>
            </div>

            <!-- SALAS -->
            <div>
              <p style="font-size:.8rem; font-weight:700; color:#003DA5; margin:0 0 .5rem; padding-bottom:.35rem; border-bottom:1px solid #e2e8f0;">Salas</p>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:.3rem; padding-left:.25rem;">
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="salas.ver" th:checked="${#strings.contains(mods,'salas.ver')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Ver salas
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="salas.crear" th:checked="${#strings.contains(mods,'salas.crear')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Crear sala
                </label>
                <label style="display:inline-flex; align-items:center; gap:.5rem; font-size:.85rem; color:#374151; cursor:pointer;">
                  <input type="checkbox" name="modulos" value="salas.estado" th:checked="${#strings.contains(mods,'salas.estado')}" style="accent-color:#003DA5; width:14px; height:14px;" />
                  Activar / Desactivar
                </label>
              </div>
            </div>

          </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; padding:.5rem 0;">
          <a th:href="@{/user/list}" style="font-size:.875rem; color:#64748b; text-decoration:underline;">Cancelar</a>
          <button type="submit" style="display:inline-flex; align-items:center; gap:.5rem; padding:.65rem 1.5rem; border-radius:8px; background:linear-gradient(90deg,#003DA5,#00A1E6); color:#fff; font-size:.875rem; font-weight:600; border:none; cursor:pointer;">
            Guardar cambios
          </button>
        </div>

      </form>
    </main>

    <script>
      (function () {
        var rolSelect = document.getElementById('rolSelect');
        var checkboxes = document.querySelectorAll('input[type="checkbox"][name="modulos"]');
        var badge = document.getElementById('adminBadge');
        function syncAdmin() {
          var isAdmin = rolSelect.value === 'ADMIN';
          checkboxes.forEach(function(cb){ cb.checked = isAdmin; });
          badge.style.display = isAdmin ? 'inline-block' : 'none';
        }
        rolSelect.addEventListener('change', syncAdmin);
        if (rolSelect.value === 'ADMIN') {
          checkboxes.forEach(function(cb){ cb.checked = true; });
          badge.style.display = 'inline-block';
        }
      })();
    </script>

  </body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/headers :: headers"></head>
  <body>
    <nav th:replace="fragments/navdar :: nav"></nav>
    <main class="max-w-3xl mx-auto p-6">
      <div class="card-3d p-6">
        <h2 class="text-xl font-bold" style="color:#002B5C;">Confirmar eliminación</h2>
        <p class="text-sm" style="color:#003DA5; margin-top:6px;">Estás a punto de eliminar el registro siguiente:</p>
        <div style="margin-top:12px; background:linear-gradient(90deg,#f7fbff,#eef8ff); padding:12px; border-radius:8px; border:1px solid rgba(0,61,165,0.06);">
          <div><strong>Nombre:</strong> <span th:text="${usuario['nombre']}"></span></div>
          <div><strong>Apellido:</strong> <span th:text="${usuario['apellido']}"></span></div>
          <div><strong>Email:</strong> <span th:text="${usuario['email']}"></span></div>
          <div><strong>Rol:</strong> <span th:text="${usuario['rol']}"></span></div>
        </div>

        <form th:action="@{/user/delete}" method="post" style="margin-top:16px; display:flex; gap:8px; justify-content:flex-end;">
          <input type="hidden" name="idx" th:value="${idx}" />
          <a th:href="@{/user/list}" class="btn-3d" style="background:#e2e8f0; color:#04204a; display:inline-flex; align-items:center; justify-content:center; padding:.6rem 1rem; border-radius:10px;">No</a>
          <button type="submit" class="btn-3d" style="background:linear-gradient(90deg,#003DA5,#00A1E6);">Sí, eliminar</button>
        </form>
      </div>
    </main>
  </body>
</html>

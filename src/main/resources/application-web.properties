# ========================================
# CONFIGURACIÓN PARA APLICACIÓN WEB
# ========================================

# Configuración específica para web browser
spring.application.name=dcim

# Puerto
server.port=${PORT:8082}

# Base de datos local MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/dcimdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Codificación UTF-8 estándar (SIN BOM) para web
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=false

# Thymeleaf templates
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Actuator
management.endpoints.web.exposure.include=health,info

# Security - CSRF habilitado para formularios web
# Ya está configurado en SecurityConfig

# ========================================
# CONFIGURACIÓN DE PRODUCCIÓN
# ========================================

# Base de datos (desde variables de entorno)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/test?sslMode=VERIFY_IDENTITY&useSSL=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Tx5LgXBUqorHfYX.root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:SGRAbutT9e8sGwdD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Deshabilitar logs de SQL en producción
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# DDL auto en producción
spring.jpa.hibernate.ddl-auto=update

# Deshabilitar import.sql en producción (datos ya existen en TiDB Cloud)
spring.sql.init.mode=never

# Actuator - Solo health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

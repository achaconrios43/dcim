spring.application.name=clases

# Puerto - usa variable de entorno PORT si está disponible (para Koyeb), sino usa 8082
server.port=${PORT:8082}

# Configuración de MySQL (TiDB Cloud)
spring.datasource.url=jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/test?sslMode=VERIFY_IDENTITY&useSSL=true
spring.datasource.username=Tx5LgXBUqorHfYX.root
spring.datasource.password=SGRAbutT9e8sGwdD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# Inicialización de datos
spring.sql.init.mode=always

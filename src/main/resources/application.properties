spring.application.name=clases

# Puerto - usa variable de entorno PORT si está disponible (para Koyeb), sino usa 8082
server.port=${PORT:8082}

# Configuración de MySQL (TiDB Cloud)
spring.datasource.url=jdbc:mysql://gateway01.us-east-1.prod.aws.tidbcloud.com:4000/test?sslMode=VERIFY_IDENTITY&useSSL=true      
spring.datasource.username=Tx5LgXBUqorHfYX.root
spring.datasource.password=SGRAbutT9e8sGwdD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - Configuración conservadora para producción
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Jackson - Manejo de fechas y JSON
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-format=HH:mm:ss
spring.jackson.default-property-inclusion=non_null

# Inicialización de datos - DESHABILITADO en producción
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# CORS - Configuración global
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false

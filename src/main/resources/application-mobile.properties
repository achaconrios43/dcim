# ========================================
# CONFIGURACIÓN PARA APLICACIÓN MÓVIL
# ========================================

# Configuración específica para app móvil
spring.application.name=dcim-mobile-api

# Puerto (mantener consistente)
server.port=${PORT:8082}

# Base de datos local MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/dcimdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS configurado en CorsConfig.java - configuración centralizada y global
# NOTA: Spring Boot 3.x no soporta propiedades spring.web.cors.* en application.properties
# Toda la configuración CORS se maneja en com.example.dcim.config.CorsConfig

# Codificación UTF-8 con BOM support para móvil
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JSON con UTF-8 BOM para compatibilidad móvil
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.http.converters.preferred-json-mapper=jackson

# Connection Pool (optimizado para móvil)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Security - CSRF deshabilitado para API móvil
# Configurar en SecurityConfig si es necesario
